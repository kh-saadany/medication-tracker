name: Build Android APK
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Generate App Assets
        run: |
          npx capacitor-assets generate --android

      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Build APK (Release)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK to reflect version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk android/app/build/outputs/apk/release/MedicationTracker-v1.0.0.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicationTracker-v1.0.0
          path: android/app/build/outputs/apk/release/MedicationTracker-v1.0.0.apk

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build-${{ github.run_number }}
          name: Release v1.0.0 Build ${{ github.run_number }}
          body: "يمكنك تحميل ملف الـ APK وتثبيته مباشرة على هاتفك لتجربة تطبيق متابعة الأدوية الأصيل مع التنبيهات الموثوقة."
          draft: false
          prerelease: false
          files: android/app/build/outputs/apk/release/MedicationTracker-v1.0.0.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
